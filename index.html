<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Teleprompter الدهشان</title>
<style>
:root{--bg:#050505;--panel:#111;--text:#fff;--muted:#bbb;--accent:#18a058;--danger:#c0392b;--border:#333}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Tahoma,sans-serif;overflow:hidden}
body{direction:rtl}.screen{height:100vh;width:100vw;display:flex;flex-direction:column}.topbar{background:#0d0d0d;border-bottom:1px solid var(--border);padding:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:5}.brand{font-weight:700;margin-left:8px;white-space:nowrap}.btn{background:#222;color:#fff;border:1px solid #555;border-radius:9px;padding:10px 14px;font-size:17px;cursor:pointer;min-width:70px}.btn:focus,.btn:hover{outline:3px solid #fff;background:#333}.btn.primary{background:var(--accent);border-color:var(--accent);font-weight:700}.btn.danger{background:var(--danger);border-color:var(--danger)}.btn.small{font-size:15px;padding:8px 10px;min-width:48px}.status{color:var(--muted);font-size:14px;margin-right:auto;direction:rtl;max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.wrap{flex:1;display:grid;grid-template-columns:390px 1fr;min-height:0}.editor{background:var(--panel);border-left:1px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0}.editor h2{font-size:18px;margin:0;color:#eee}.editor textarea{width:100%;flex:1;resize:none;background:#060606;color:#fff;border:1px solid #444;border-radius:10px;padding:12px;font-size:18px;line-height:1.7;direction:rtl;font-family:Arial,Tahoma,sans-serif}.field{display:flex;align-items:center;gap:8px;justify-content:space-between}.field label{font-size:15px;color:#ddd;white-space:nowrap}.field input[type=range]{width:190px}.field input[type=number]{width:76px;background:#060606;color:#fff;border:1px solid #555;border-radius:8px;padding:7px}.linkbox{display:none;gap:6px;flex-direction:column;background:#050505;border:1px solid #444;border-radius:10px;padding:8px}.linkbox textarea{height:74px;font-size:13px;direction:ltr;text-align:left;line-height:1.3}.stage{position:relative;overflow:hidden;background:#000;min-height:0}.guide{position:absolute;left:0;right:0;top:48%;height:2px;background:rgba(255,255,255,.25);z-index:2;pointer-events:none}.prompt{position:absolute;left:0;right:0;top:0;transform:translateY(0);padding:45vh 7vw 60vh 7vw;white-space:pre-wrap;word-wrap:break-word;line-height:1.65;font-size:48px;text-align:center;color:#fff;direction:rtl}.prompt.mirror{transform:scaleX(-1) translateY(0)}.hideEditor .wrap{grid-template-columns:1fr}.hideEditor .editor{display:none}.hideControls .topbar{display:none}.hideControls .wrap{grid-template-columns:1fr;height:100vh}.toast{position:fixed;bottom:16px;left:16px;right:16px;background:#222;border:1px solid #555;border-radius:12px;padding:12px;text-align:center;font-size:17px;display:none;z-index:20}.qrhint{font-size:13px;color:#aaa;line-height:1.5}@media(max-width:800px){.wrap{grid-template-columns:1fr}.editor{max-height:45vh;border-left:0;border-bottom:1px solid var(--border)}.prompt{font-size:38px}.status{display:none}.btn{font-size:16px;padding:9px 11px}}
</style>
</head>
<body>
<div class="screen" id="app">
  <div class="topbar" id="topbar">
    <div class="brand">Teleprompter الدهشان</div>
    <button class="btn primary" id="playBtn" tabindex="1">▶ تشغيل</button>
    <button class="btn" id="resetBtn" tabindex="2">↺ رجوع</button>
    <button class="btn" id="fsBtn" tabindex="3">ملء الشاشة</button>
    <button class="btn" id="toggleEditBtn" tabindex="4">إخفاء التحرير</button>
    <button class="btn" id="shareBtn" tabindex="5">رابط قصير للتليفزيون</button>
    <span class="status" id="status">جاهز</span>
  </div>
  <div class="wrap">
    <aside class="editor" id="editorPanel">
      <h2>الصق النص هنا من اللاب</h2>
      <textarea id="textInput" placeholder="الصق النص هنا... ثم اضغط رابط قصير للتليفزيون"></textarea>
      <div class="field"><label>السرعة</label><input id="speed" type="range" min="5" max="180" value="45"><input id="speedNum" type="number" min="5" max="180" value="45"></div>
      <div class="field"><label>حجم الخط</label><input id="fontSize" type="range" min="24" max="110" value="52"><input id="fontNum" type="number" min="24" max="110" value="52"></div>
      <div class="field"><label>عكس النص Mirror</label><input id="mirror" type="checkbox"></div>
      <div class="field"><label>إخفاء الأزرار عند التشغيل</label><input id="autoHide" type="checkbox" checked></div>
      <div class="linkbox" id="linkBox">
        <div class="qrhint">افتح هذا الرابط على التليفزيون. الرابط قصير لأن النص محفوظ أونلاين.</div>
        <textarea id="shareLink" readonly></textarea>
        <button class="btn small primary" id="copyBtn">نسخ الرابط</button>
      </div>
      <div class="qrhint">على التليفزيون: زر OK أو Enter يشغل ويوقف. الأسهم ↑ ↓ تغير السرعة. الأسهم ← → تغير حجم الخط.</div>
    </aside>
    <main class="stage" id="stage" tabindex="6">
      <div class="guide"></div>
      <div class="prompt" id="prompt"></div>
    </main>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){
'use strict';
var API='https://api.jsonstorage.net/v1/json';
var app=document.getElementById('app'),textInput=document.getElementById('textInput'),promptEl=document.getElementById('prompt'),playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn'),fsBtn=document.getElementById('fsBtn'),toggleEditBtn=document.getElementById('toggleEditBtn'),shareBtn=document.getElementById('shareBtn'),statusEl=document.getElementById('status'),speed=document.getElementById('speed'),speedNum=document.getElementById('speedNum'),fontSize=document.getElementById('fontSize'),fontNum=document.getElementById('fontNum'),mirror=document.getElementById('mirror'),autoHide=document.getElementById('autoHide'),linkBox=document.getElementById('linkBox'),shareLink=document.getElementById('shareLink'),copyBtn=document.getElementById('copyBtn'),stage=document.getElementById('stage'),toast=document.getElementById('toast');
var playing=false,y=0,last=0,raf=0,loadedFromLink=false;
function showToast(m){toast.textContent=m;toast.style.display='block';clearTimeout(showToast.t);showToast.t=setTimeout(function(){toast.style.display='none'},3500)}
function setStatus(m){statusEl.textContent=m}
function updatePrompt(){var t=textInput.value||'';promptEl.textContent=t.trim()?t:'الصق النص من اللاب أو افتح رابط المشاركة على التليفزيون';localStorage.setItem('dhshan_tp_text',t)}
function applySettings(){var fs=parseInt(fontSize.value||52,10);promptEl.style.fontSize=fs+'px';fontNum.value=fs;speedNum.value=speed.value;promptEl.className='prompt'+(mirror.checked?' mirror':'');localStorage.setItem('dhshan_tp_settings',JSON.stringify({speed:speed.value,font:fontSize.value,mirror:mirror.checked,autoHide:autoHide.checked}))}
function loadLocal(){try{var s=JSON.parse(localStorage.getItem('dhshan_tp_settings')||'{}');if(s.speed){speed.value=s.speed;speedNum.value=s.speed}if(s.font){fontSize.value=s.font;fontNum.value=s.font}if(typeof s.mirror==='boolean')mirror.checked=s.mirror;if(typeof s.autoHide==='boolean')autoHide.checked=s.autoHide;var t=localStorage.getItem('dhshan_tp_text');if(t&&!textInput.value)textInput.value=t}catch(e){}}
function tick(ts){if(!playing)return;if(!last)last=ts;var dt=(ts-last)/1000;last=ts;y-=dt*parseFloat(speed.value||45);setTransform();raf=requestAnimationFrame(tick)}
function setTransform(){if(mirror.checked){promptEl.style.transform='scaleX(-1) translateY('+y+'px)'}else{promptEl.style.transform='translateY('+y+'px)'}}
function play(){updatePrompt();if(!textInput.value.trim()){showToast('ضع النص أولاً');return}playing=true;last=0;playBtn.textContent='⏸ إيقاف';if(autoHide.checked){document.body.classList.add('hideControls','hideEditor')}setStatus('يعمل');stage.focus();cancelAnimationFrame(raf);raf=requestAnimationFrame(tick)}
function pause(){playing=false;playBtn.textContent='▶ تشغيل';document.body.classList.remove('hideControls');setStatus('متوقف');cancelAnimationFrame(raf)}
function togglePlay(){playing?pause():play()}
function reset(){pause();y=0;setTransform();setStatus('تم الرجوع للبداية')}
function fullScreen(){var el=document.documentElement;if(!document.fullscreenElement){(el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen||function(){}).call(el)}else{(document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen||function(){}).call(document)}}
function toggleEditor(){document.body.classList.toggle('hideEditor');toggleEditBtn.textContent=document.body.classList.contains('hideEditor')?'إظهار التحرير':'إخفاء التحرير'}
function safeBase64(s){try{return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}catch(e){return ''}}
function fromBase64(s){try{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return decodeURIComponent(escape(atob(s)))}catch(e){return ''}}
function shortUrlFromUri(uri){var m=String(uri||'').match(/\/v1\/json\/([^\/]+)\/([^\/?#]+)/);if(m)return location.origin+location.pathname+'?id='+encodeURIComponent(m[1]+'/'+m[2]);return ''}
function apiUrlFromId(id){id=String(id||'').replace(/^\/+|\/+$/g,'');return API+'/'+id}
async function createShortLink(){updatePrompt();applySettings();var t=textInput.value.trim();if(!t){showToast('ضع النص أولاً');return}var bytes=new Blob([t]).size;if(bytes>62000){showToast('النص كبير جدًا للخدمة المجانية. قسّمه إلى جزءين.');return}setStatus('جاري حفظ النص أونلاين...');shareBtn.disabled=true;try{var payload={text:t,settings:{speed:speed.value,font:fontSize.value,mirror:mirror.checked,autoHide:autoHide.checked},created:new Date().toISOString(),app:'dhshan-teleprompter'};var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!res.ok)throw new Error('HTTP '+res.status);var loc=res.headers.get('Location')||'';if(!loc){try{var j=await res.json();loc=j.uri||j.url||''}catch(e){}}
var link=shortUrlFromUri(loc);if(!link)throw new Error('No Location header');shareLink.value=link;linkBox.style.display='flex';setStatus('تم إنشاء الرابط القصير');showToast('تم إنشاء الرابط القصير. انسخه وافتحه على التليفزيون.');try{await navigator.clipboard.writeText(link);showToast('تم إنشاء الرابط ونسخه تلقائيًا')}catch(e){}
}catch(err){console.error(err);setStatus('فشل إنشاء الرابط');showToast('تعذر إنشاء الرابط القصير. تأكد من الإنترنت أو جرّب تحديث الصفحة.');}
finally{shareBtn.disabled=false}
}
async function loadFromId(id){setStatus('جاري تحميل النص...');try{var res=await fetch(apiUrlFromId(id),{method:'GET'});if(!res.ok)throw new Error('HTTP '+res.status);var data=await res.json();if(!data||!data.text)throw new Error('No text');textInput.value=data.text;if(data.settings){if(data.settings.speed){speed.value=data.settings.speed;speedNum.value=data.settings.speed}if(data.settings.font){fontSize.value=data.settings.font;fontNum.value=data.settings.font}if(typeof data.settings.mirror==='boolean')mirror.checked=data.settings.mirror;if(typeof data.settings.autoHide==='boolean')autoHide.checked=data.settings.autoHide}loadedFromLink=true;updatePrompt();applySettings();document.body.classList.add('hideEditor');setStatus('تم تحميل النص من الرابط');showToast('تم تحميل النص. اضغط OK أو تشغيل للبدء.')}catch(e){console.error(e);setStatus('فشل تحميل النص');showToast('تعذر تحميل النص من الرابط. تأكد من الإنترنت ومن صحة الرابط.')}}
function readUrl(){var p=new URLSearchParams(location.search);var id=p.get('id');if(id){loadFromId(id);return}var old=p.get('t')||p.get('text');if(old){var txt=fromBase64(old);if(txt){textInput.value=txt;loadedFromLink=true;updatePrompt();document.body.classList.add('hideEditor');showToast('تم تحميل النص من الرابط القديم');}}}
playBtn.addEventListener('click',togglePlay);playBtn.addEventListener('touchend',function(e){e.preventDefault();togglePlay()});resetBtn.addEventListener('click',reset);fsBtn.addEventListener('click',fullScreen);toggleEditBtn.addEventListener('click',toggleEditor);shareBtn.addEventListener('click',createShortLink);copyBtn.addEventListener('click',function(){shareLink.select();document.execCommand('copy');showToast('تم نسخ الرابط')});textInput.addEventListener('input',updatePrompt);speed.addEventListener('input',applySettings);fontSize.addEventListener('input',applySettings);speedNum.addEventListener('input',function(){speed.value=this.value;applySettings()});fontNum.addEventListener('input',function(){fontSize.value=this.value;applySettings()});mirror.addEventListener('change',applySettings);autoHide.addEventListener('change',applySettings);stage.addEventListener('click',togglePlay);document.addEventListener('keydown',function(e){var k=e.key||e.code;if(k===' '||k==='Enter'||k==='NumpadEnter'||k==='MediaPlayPause'){e.preventDefault();togglePlay()}else if(k==='Escape'||k==='Backspace'){pause();document.body.classList.remove('hideControls','hideEditor')}else if(k==='ArrowUp'){speed.value=Math.min(180,parseInt(speed.value)+5);applySettings()}else if(k==='ArrowDown'){speed.value=Math.max(5,parseInt(speed.value)-5);applySettings()}else if(k==='ArrowRight'){fontSize.value=Math.min(110,parseInt(fontSize.value)+2);applySettings()}else if(k==='ArrowLeft'){fontSize.value=Math.max(24,parseInt(fontSize.value)-2);applySettings()}});
loadLocal();readUrl();updatePrompt();applySettings();setTransform();
})();
</script>
</body>
</html>
