<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Teleprompter الدهشان</title>
<style>
:root{--bg:#050505;--panel:#151515;--text:#fff;--muted:#bbb;--accent:#d4af37}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Tahoma,sans-serif;overflow:hidden}.app{height:100vh;display:flex;flex-direction:column}.controls{background:var(--panel);padding:10px;display:grid;grid-template-columns:1fr auto;gap:10px;border-bottom:1px solid #333}.textarea{width:100%;min-height:110px;background:#080808;color:#fff;border:1px solid #444;border-radius:10px;padding:12px;font-size:18px;line-height:1.7;resize:vertical}.buttons{display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;min-width:315px}button,input{border:0;border-radius:9px;padding:10px 12px;font-size:15px}button{background:var(--accent);color:#000;font-weight:700;cursor:pointer}button.secondary{background:#333;color:#fff}.range{background:#222;color:#fff;width:145px}.viewer{position:relative;flex:1;overflow:hidden}.text{position:absolute;width:100%;padding:7vh 8vw 35vh;text-align:center;font-size:54px;line-height:1.75;white-space:pre-wrap;font-weight:700}.mirror{transform:scaleX(-1)}.hint{font-size:13px;color:var(--muted);padding-top:5px}.shareBox{direction:ltr;text-align:left;width:100%;background:#070707;color:#eee;border:1px solid #444;border-radius:8px;padding:9px;font-size:12px;word-break:break-all;max-height:72px;overflow:auto}body.full .controls{display:none}body.full .text{font-size:64px}@media(max-width:800px){.controls{grid-template-columns:1fr}.buttons{min-width:auto}.text{font-size:38px;padding:5vh 5vw 35vh}}
</style>
</head>
<body>
<div class="app">
  <div class="controls">
    <div>
      <textarea id="input" class="textarea" placeholder="الصق النص هنا..."></textarea>
      <div class="hint">على اللاب: الصق النص ثم اضغط إنشاء رابط للتليفزيون. افتح الرابط على التليفزيون فيظهر النص تلقائيًا.</div>
      <div id="share" class="shareBox" style="display:none"></div>
    </div>
    <div class="buttons">
      <button onclick="start()">تشغيل</button>
      <button class="secondary" onclick="pause()">إيقاف</button>
      <button class="secondary" onclick="resetScroll()">رجوع للبداية</button>
      <button class="secondary" onclick="toggleFull()">ملء الشاشة</button>
      <button class="secondary" onclick="toggleMirror()">عكس Mirror</button>
      <button onclick="makeLink()">إنشاء رابط للتليفزيون</button>
      <button class="secondary" onclick="copyLink()">نسخ الرابط</button>
      <label>السرعة <input id="speed" class="range" type="range" min="0.3" max="8" step="0.1" value="1.5"></label>
      <label>حجم الخط <input id="size" class="range" type="range" min="24" max="110" step="1" value="54"></label>
    </div>
  </div>
  <div class="viewer" id="viewer"><div id="text" class="text"></div></div>
</div>
<script>
const input=document.getElementById('input'), text=document.getElementById('text'), speed=document.getElementById('speed'), size=document.getElementById('size'), share=document.getElementById('share');
let running=false, y=0, last=0, currentLink='';
function b64EncodeUnicode(str){return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function b64DecodeUnicode(str){str=str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return decodeURIComponent(escape(atob(str)))}
function setText(v){input.value=v; text.textContent=v || 'الصق النص من اللاب أو افتح رابط النص على التليفزيون'; localStorage.setItem('dhshan_prompt_text', v)}
function load(){let h=new URLSearchParams(location.hash.slice(1)); let q=h.get('text'); if(q){try{setText(b64DecodeUnicode(q)); return}catch(e){setText(q);return}} setText(localStorage.getItem('dhshan_prompt_text')||'')}
input.addEventListener('input',()=>setText(input.value));
size.addEventListener('input',()=>text.style.fontSize=size.value+'px');
function loop(t){if(!last)last=t; let dt=(t-last)/16; last=t; if(running){y-=Number(speed.value)*dt; text.style.transform=(text.classList.contains('mirror')?'scaleX(-1) ':'')+`translateY(${y}px)`} requestAnimationFrame(loop)}
function start(){running=true; document.body.classList.add('full'); if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{})}
function pause(){running=false}
function resetScroll(){y=0;text.style.transform=(text.classList.contains('mirror')?'scaleX(-1) ':'')+'translateY(0px)'}
function toggleFull(){document.body.classList.toggle('full')}
function toggleMirror(){text.classList.toggle('mirror'); resetScroll()}
function makeLink(){const encoded=b64EncodeUnicode(input.value); currentLink=location.origin+location.pathname+'#text='+encoded; share.style.display='block'; share.textContent=currentLink; navigator.clipboard?.writeText(currentLink)}
function copyLink(){if(!currentLink) makeLink(); navigator.clipboard?.writeText(currentLink); alert('تم نسخ الرابط')}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();running?pause():start()} if(e.key==='Escape'){document.body.classList.remove('full');pause()}})
load(); text.style.fontSize=size.value+'px'; requestAnimationFrame(loop);
</script>
</body>
</html>
