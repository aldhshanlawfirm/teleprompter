<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Teleprompter الدهشان</title>
<style>
:root{--bg:#050505;--panel:#111;--text:#fff;--muted:#bbb;--accent:#f5c542;--danger:#ff5c5c;--ok:#22c55e;--border:#333;--fs:52px;--lh:1.75}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Arial,Tahoma,sans-serif;overflow:hidden}button,input,textarea,select{font-family:inherit;font-size:18px}button{cursor:pointer;border:0;border-radius:14px;padding:13px 18px;background:#2a2a2a;color:#fff;font-weight:700}button:focus,input:focus,textarea:focus{outline:4px solid var(--accent);outline-offset:2px}button.primary{background:var(--accent);color:#111}button.green{background:var(--ok);color:#06240f}button.red{background:var(--danger);color:#210000}.app{height:100vh;display:flex;flex-direction:column}.topbar{display:flex;gap:10px;align-items:center;padding:10px;background:rgba(15,15,15,.96);border-bottom:1px solid var(--border);z-index:5;flex-wrap:wrap}.brand{font-weight:900;color:var(--accent);margin-left:auto;white-space:nowrap}.small{font-size:14px;color:var(--muted)}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.controls label{font-size:14px;color:var(--muted);display:flex;gap:6px;align-items:center}.controls input[type=range]{width:110px}.main{flex:1;display:grid;grid-template-columns:420px 1fr;min-height:0}.editor{background:var(--panel);border-left:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:10px;min-height:0}.editor textarea{flex:1;min-height:160px;resize:none;background:#080808;color:#fff;border:1px solid #333;border-radius:14px;padding:14px;line-height:1.7}.shareBox{display:none;background:#0b1b12;border:1px solid #1e6b3a;border-radius:14px;padding:12px;direction:ltr;text-align:left;color:#eaffef;word-break:break-all}.hint{background:#171717;border:1px solid #333;border-radius:14px;padding:10px;color:#ddd;line-height:1.7}.stageWrap{position:relative;height:100%;overflow:hidden}.stage{position:absolute;inset:0;overflow:hidden;padding:10vh 6vw 70vh 6vw}.text{font-size:var(--fs);line-height:var(--lh);font-weight:800;white-space:pre-wrap;text-align:right;transform-origin:center top;will-change:transform}.text.mirror{transform:scaleX(-1)}.status{position:absolute;left:14px;bottom:14px;background:rgba(0,0,0,.75);border:1px solid #333;border-radius:14px;padding:8px 12px;color:#ddd;font-size:15px;z-index:4}.overlayStart{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.65);z-index:3}.overlayStart button{font-size:34px;padding:22px 38px}.toast{position:fixed;top:70px;left:16px;right:16px;margin:auto;max-width:900px;background:#111;border:1px solid #555;border-radius:16px;padding:14px 18px;z-index:20;display:none;line-height:1.7;text-align:center}.loading{position:fixed;inset:0;background:#050505;display:none;align-items:center;justify-content:center;z-index:30;font-size:28px;color:var(--accent);text-align:center;padding:30px}@media(max-width:900px){.main{grid-template-columns:1fr}.editor{height:42vh;border-left:0;border-bottom:1px solid var(--border)}.stageWrap{height:58vh}.brand{width:100%;margin:0}.topbar{max-height:46vh;overflow:auto}.text{font-size:42px}.stage{padding:8vh 5vw 55vh 5vw}}.tvMode .editor,.tvMode .brand,.tvMode .hint{display:none}.tvMode .main{display:block}.tvMode .topbar{position:absolute;top:0;right:0;left:0;background:rgba(0,0,0,.55);opacity:.25;transition:.2s}.tvMode .topbar:focus-within,.tvMode .topbar:hover{opacity:1}.tvMode .stageWrap{height:100vh}.tvMode .stage{padding-top:14vh}.hidden{display:none!important}
</style>
</head>
<body>
<div id="loading" class="loading">جاري تحميل النص...</div>
<div id="toast" class="toast"></div>
<div class="app" id="app">
  <div class="topbar" id="topbar">
    <div class="brand">Teleprompter الدهشان</div>
    <button id="playBtn" class="primary" tabindex="1">▶ تشغيل</button>
    <button id="pauseBtn" tabindex="2">⏸ إيقاف</button>
    <button id="restartBtn" tabindex="3">↻ من البداية</button>
    <button id="fsBtn" tabindex="4">⛶ ملء الشاشة</button>
    <button id="tvBtn" tabindex="5">📺 وضع التليفزيون</button>
    <div class="controls">
      <label>السرعة <input id="speed" type="range" min="5" max="180" value="38"></label>
      <label>الخط <input id="fontSize" type="range" min="28" max="96" value="52"></label>
      <label><input id="mirror" type="checkbox"> Mirror</label>
    </div>
  </div>
  <div class="main">
    <aside class="editor">
      <textarea id="editor" placeholder="الصق النص هنا من اللاب توب..."></textarea>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="makeLink" class="green">إنشاء رابط قصير للتليفزيون</button>
        <button id="copyLink">نسخ الرابط</button>
        <button id="clearText" class="red">مسح النص</button>
      </div>
      <div id="shareBox" class="shareBox"></div>
      <div class="hint">النسخة الجديدة لا تضع النص داخل الرابط. يتم حفظ النص مؤقتًا على خدمة JSONBlob ويظهر لك رابط قصير تفتحه على التليفزيون. لو زر التشغيل لا يعمل من الريموت، اضغط OK أو Enter أو رقم 0.</div>
    </aside>
    <section class="stageWrap" id="stageWrap">
      <div class="overlayStart" id="overlayStart"><button id="bigPlay" class="primary">▶ تشغيل</button></div>
      <div class="stage" id="stage"><div class="text" id="text"></div></div>
      <div class="status" id="status">جاهز</div>
    </section>
  </div>
</div>
<script>
(function(){
'use strict';
var API='https://jsonblob.com/api/jsonBlob/';
var el=function(id){return document.getElementById(id)};
var app=el('app'), editor=el('editor'), text=el('text'), stage=el('stage'), status=el('status'), toast=el('toast'), loading=el('loading');
var playBtn=el('playBtn'), pauseBtn=el('pauseBtn'), restartBtn=el('restartBtn'), fsBtn=el('fsBtn'), tvBtn=el('tvBtn'), speed=el('speed'), fontSize=el('fontSize'), mirror=el('mirror');
var makeLink=el('makeLink'), copyLink=el('copyLink'), shareBox=el('shareBox'), clearText=el('clearText'), bigPlay=el('bigPlay'), overlayStart=el('overlayStart');
var y=0, playing=false, lastTime=0, currentLink='';
function show(msg,ms){toast.textContent=msg;toast.style.display='block';clearTimeout(show.t);show.t=setTimeout(function(){toast.style.display='none'},ms||2500)}
function setStatus(msg){status.textContent=msg}
function syncText(){var v=editor.value||'';text.textContent=v.trim()?v:'الصق النص من اللاب توب ثم أنشئ رابطًا قصيرًا وافتحه على التليفزيون.';try{localStorage.setItem('dhshan_tp_text',v)}catch(e){}}
function applySettings(){document.documentElement.style.setProperty('--fs',fontSize.value+'px');text.className='text'+(mirror.checked?' mirror':'');try{localStorage.setItem('dhshan_tp_speed',speed.value);localStorage.setItem('dhshan_tp_font',fontSize.value);localStorage.setItem('dhshan_tp_mirror',mirror.checked?'1':'0')}catch(e){}}
function start(){syncText();playing=true;overlayStart.style.display='none';lastTime=performance.now();setStatus('تشغيل');requestAnimationFrame(tick)}
function pause(){playing=false;setStatus('متوقف مؤقتًا')}
function restart(){y=0;stage.scrollTop=0;setStatus('من البداية')}
function tick(now){if(!playing)return;var dt=Math.min(50,now-lastTime);lastTime=now;y+=Number(speed.value)*dt/1000;stage.scrollTop=y;if(stage.scrollTop+stage.clientHeight>=stage.scrollHeight-5){playing=false;setStatus('انتهى النص');return}requestAnimationFrame(tick)}
function fullScreen(){var d=document.documentElement;if(!document.fullscreenElement){(d.requestFullscreen||d.webkitRequestFullscreen||d.msRequestFullscreen||function(){}).call(d)}else{(document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen||function(){}).call(document)}}
function tvMode(on){app.classList.toggle('tvMode',on);overlayStart.style.display=on&&!playing?'flex':'none';try{localStorage.setItem('dhshan_tp_tv',on?'1':'0')}catch(e){}}
function copy(txt){if(navigator.clipboard&&navigator.clipboard.writeText){return navigator.clipboard.writeText(txt)}var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);return Promise.resolve()}
function makeShortLink(){syncText();var body={text:editor.value||'',created:new Date().toISOString(),app:'dhshan-teleprompter-v2'};if(!body.text.trim()){show('الصق النص أولًا');return}setStatus('جاري إنشاء الرابط...');makeLink.disabled=true;fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body)}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);var loc=r.headers.get('Location')||'';return r.json().then(function(){return loc})}).then(function(loc){var id=(loc.split('/').pop()||'').trim();if(!id)throw new Error('لم يتم استلام رقم الحفظ');currentLink=location.origin+location.pathname+'?id='+encodeURIComponent(id)+'&tv=1';shareBox.style.display='block';shareBox.textContent=currentLink;copy(currentLink).then(function(){show('تم إنشاء ونسخ رابط قصير للتليفزيون')});setStatus('تم إنشاء الرابط')}).catch(function(e){console.error(e);show('تعذر إنشاء رابط قصير. تأكد من الإنترنت ثم حاول مرة أخرى.');setStatus('فشل إنشاء الرابط')}).finally(function(){makeLink.disabled=false})}
function loadById(id){loading.style.display='flex';fetch(API+encodeURIComponent(id),{headers:{'Accept':'application/json'}}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(data){var v=(data&&data.text)||'';editor.value=v;syncText();setTimeout(function(){tvMode(true);restart();overlayStart.style.display='flex';setStatus('النص جاهز على التليفزيون')},100)}).catch(function(e){console.error(e);show('لم يتم تحميل النص. الرابط غير صحيح أو الإنترنت غير متصل.',5000);setStatus('فشل تحميل النص')}).finally(function(){loading.style.display='none'})}
function legacyLoad(){var p=new URLSearchParams(location.search);var id=p.get('id');if(id){loadById(id);return}var old=p.get('t')||p.get('text');if(old){try{editor.value=decodeURIComponent(escape(atob(old.replace(/-/g,'+').replace(/_/g,'/'))));syncText();tvMode(p.get('tv')==='1')}catch(e){}}}
function init(){try{editor.value=localStorage.getItem('dhshan_tp_text')||'';speed.value=localStorage.getItem('dhshan_tp_speed')||speed.value;fontSize.value=localStorage.getItem('dhshan_tp_font')||fontSize.value;mirror.checked=localStorage.getItem('dhshan_tp_mirror')==='1';if(localStorage.getItem('dhshan_tp_tv')==='1')app.classList.add('tvMode')}catch(e){}syncText();applySettings();legacyLoad();}
editor.addEventListener('input',syncText);speed.addEventListener('input',applySettings);fontSize.addEventListener('input',applySettings);mirror.addEventListener('change',applySettings);
playBtn.addEventListener('click',start);pauseBtn.addEventListener('click',pause);restartBtn.addEventListener('click',restart);fsBtn.addEventListener('click',fullScreen);tvBtn.addEventListener('click',function(){tvMode(!app.classList.contains('tvMode'))});bigPlay.addEventListener('click',start);makeLink.addEventListener('click',makeShortLink);copyLink.addEventListener('click',function(){if(currentLink){copy(currentLink).then(function(){show('تم نسخ الرابط')})}else show('أنشئ الرابط أولًا')});clearText.addEventListener('click',function(){editor.value='';syncText();restart()});
document.addEventListener('keydown',function(e){var k=e.key||'';if(k===' '||k==='Enter'||k==='OK'||k==='MediaPlayPause'||k==='0'){e.preventDefault();playing?pause():start()}else if(k==='ArrowUp'){speed.value=Math.min(180,Number(speed.value)+5);applySettings()}else if(k==='ArrowDown'){speed.value=Math.max(5,Number(speed.value)-5);applySettings()}else if(k==='ArrowRight'){stage.scrollTop=Math.max(0,stage.scrollTop-150);y=stage.scrollTop}else if(k==='ArrowLeft'){stage.scrollTop+=150;y=stage.scrollTop}else if(k==='Escape'){pause()}},false);
stage.addEventListener('click',function(){playing?pause():start()});
init();
})();
</script>
</body>
</html>
